name: Production Deployment Pipeline

permissions:
  contents: write

on:
  push:
    branches: ["prod"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Update image tag')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_DEV_TOKEN }}

      - name: Login to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          push: true
          tags: |
            registry.digitalocean.com/ib-registry/ib2-frontend:paas-service-test_${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update docker-compose-prod image tag
        run: |
          TAG="paas-service-test_${{ github.sha }}"
          sed -i "s|ib2-frontend:paas-service-test_.*|ib2-frontend:${TAG}|g" deployment/docker-compose-prod.yml

      - name: Commit updated compose file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add deployment/docker-compose-prod.yml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"
          git push origin prod

      - name: Trigger Dokploy Deployment
        run: |
          curl -X POST ${{ secrets.DOKPLOY_DEPLOY_HOOK }}