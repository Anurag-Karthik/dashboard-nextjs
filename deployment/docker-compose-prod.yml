services:
  server:
    container_name: nextjs-server
    build:
      context: .
      dockerfile: deployment/Dockerfile
    image: registry.digitalocean.com/ib-registry/ib2-frontend:paas-service-test_36850d709617063d4f15186c609bf6b60b65e947
    pull_policy: always
    environment:
      NODE_ENV: production
    networks:
      - dokploy-network
    ports:
      - 3000:3000
    env_file:
      - .env

  postgres:
    image: postgres:16
    container_name: nextjs-postgres
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - dokploy-network
    ports:
      - 5432:5432
    env_file:
      - .env

volumes:
  db_data:

networks:
  dokploy-network:
    external: true