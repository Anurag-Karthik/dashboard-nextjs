services:
  postgres:
    image: postgres:16
    container_name: nextjs-postgres
    restart: always
    networks:
      - nextjs
    ports:
      - 5432:5432
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - .env

volumes:
  db_data:

networks:
  nextjs:
    external: true
